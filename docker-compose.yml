version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=sqlite:///./veriface.db
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173
      - UPLOAD_FOLDER=./uploads
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/veriface.db:/app/veriface.db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
